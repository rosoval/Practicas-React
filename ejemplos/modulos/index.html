<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Calculadora</title>
</head>

<body>
  <h1>Calculadora</h1>

  <main>
    <ul class="history"></ul>
    <button type="reset" id="clearAll">Limpiar</button>

    <form>
      <input type="text" name="result" id="result" />

      <button type="button">1</button>
      <button type="button">2</button>
      <button type="button">3</button>
      <button type="button">4</button>
      <button type="button">5</button>
      <button type="button">6</button>
      <button type="button">7</button>
      <button type="button">8</button>
      <button type="button">9</button>
      <button type="button" class="cero">0</button>
      <button type="button">.</button>

      <div class="operadores">
        <button type="button" title="suma">+</button>
        <button type="button" title="resta">-</button>
        <button type="button" title="multiplicación"">X</button>
          <button type=" button" title="división">/</button>
        <button type="submit">=</button>
      </div>

    </form>
  </main>
</body>

<script type="module" src="script.js"></script>

</html>
